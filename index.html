<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CinéPaff</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page auth-page" id="authPage">
      <section class="auth-shell" aria-label="Authentification">
        <h1 class="brand"><img src="./image/Logo.png" alt="CinéPaff" /></h1>
        <form id="authForm" class="auth-form">
          <input id="identifier" placeholder="ID" autocomplete="username" />
          <input id="password" placeholder="MDP" type="password" autocomplete="current-password" />
          <p class="error" id="authError"></p>
          <button id="authSubmit" type="submit">Connexion</button>
        </form>
        <button class="link-button" id="authToggle">Créer un compte</button>
      </section>
    </main>

    <main class="page app-page hidden" id="appPage">
      <header class="topbar">
        <h1 class="brand brand--topbar"><img src="./image/Logo.png" alt="CinéPaff" /></h1>
        <div class="session">
          <span id="currentUser"></span>
          <button id="logoutButton">Déconnexion</button>
        </div>
      </header>

      <nav class="tabs" aria-label="Navigation">
        <button class="tab" type="button" data-route="home">Accueil</button>
        <button class="tab admin-only hidden" type="button" data-route="draws">Tirages</button>
        <button class="tab" type="button" data-route="cinema">Salle</button>
        <button class="tab" type="button" data-route="history">Historique</button>
        <button class="tab" type="button" data-route="profile">Profil</button>
      </nav>

      <section class="view" id="homeView" data-view="home">
        <div class="home-layout">
          <section class="panel proposal-panel">
            <div class="panel-head">
              <h2>Proposer un film</h2>
            </div>
            <form class="search" id="searchForm">
              <input id="movieQuery" placeholder="Film" />
              <button type="submit">Rechercher</button>
            </form>
            <p class="message" id="message"></p>
            <div class="results" id="results"></div>
          </section>

          <section class="panel slate-panel">
            <div class="panel-head">
              <h2>Films proposés</h2>
            </div>
            <div class="poster-grid" id="movieList"></div>
          </section>
        </div>
      </section>

      <section class="view hidden" id="drawsView" data-view="draws">
        <div class="draw-layout">
          <section class="panel draw-panel" id="adminPanel">
            <div class="panel-head">
              <h2>Tirages</h2>
              <button id="drawButton">Lancer le tirage</button>
            </div>
            <div class="draw-stage" id="drawStage" aria-live="polite">
              <div class="cover-stack" id="coverStack"></div>
              <div class="winner hidden" id="winnerCard">
                <div class="winner-poster" id="winnerPoster"></div>
                <div>
                  <h2>Film tiré</h2>
                  <strong id="winnerTitle"></strong>
                  <small id="winnerUser"></small>
                </div>
              </div>
            </div>
          </section>

          <section class="panel admin-panel" id="usersPanel">
            <div class="panel-head">
              <h2>Admin</h2>
            </div>
            <div class="list" id="userList"></div>
          </section>
        </div>
      </section>

      <section class="view hidden" id="cinemaView" data-view="cinema">
        <section class="panel cinema-panel">
          <div class="panel-head">
            <h2>Salle</h2>
            <div class="cinema-actions">
              <button id="startCinemaButton" type="button">Partager</button>
              <button id="stopCinemaButton" type="button" disabled>Arrêter</button>
            </div>
          </div>
          <div class="list cinema-shares" id="cinemaShares"></div>
          <div class="cinema-screen" id="cinemaScreen">
            <video id="cinemaVideo" autoplay playsinline></video>
          </div>
          <button id="fullscreenCinemaButton" type="button" disabled>Plein écran</button>
          <p class="message" id="cinemaMessage"></p>
        </section>
      </section>

      <section class="view hidden" id="historyView" data-view="history">
        <section class="panel compact-panel">
          <div class="panel-head">
            <h2>Historique</h2>
          </div>
          <div class="list" id="historyList"></div>
        </section>
      </section>

      <section class="view hidden" id="profileView" data-view="profile">
        <section class="panel compact-panel">
          <div class="panel-head">
            <h2>Profil</h2>
          </div>
          <div class="list" id="profileDetails"></div>
        </section>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
