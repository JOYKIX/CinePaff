<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grand Paff</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page auth-page" id="authPage">
      <section class="auth-card" aria-label="Authentification">
        <h1 class="brand"><img src="./image/Logo.png" alt="Grand Paff" /></h1>
        <form id="authForm" class="auth-form">
          <input id="identifier" placeholder="ID" autocomplete="username" aria-label="ID" />
          <input id="password" placeholder="MDP" type="password" autocomplete="current-password" aria-label="MDP" />
          <p class="error" id="authError"></p>
          <button id="authSubmit" type="submit">Connexion</button>
        </form>
        <button class="ghost-button" id="authToggle">Créer un compte</button>
      </section>
    </main>

    <main class="page app-page hidden" id="appPage">
      <div class="app-shell" aria-label="Application">
        <header class="app-header">
          <h1 class="brand brand--app"><img src="./image/Logo.png" alt="Grand Paff" /></h1>

          <div class="nav-row">
            <nav class="tabs" aria-label="Navigation">
              <button class="tab" type="button" data-route="home">Accueil</button>
              <button class="tab admin-only hidden" type="button" data-route="draws">Tirages</button>
              <button class="tab" type="button" data-route="seen">Films vus</button>
              <button class="tab" type="button" data-route="profile">Profil</button>
            </nav>

            <section class="session" aria-label="Utilisateur">
              <span id="currentUser"></span>
              <button id="logoutButton">Déconnexion</button>
            </section>
          </div>
        </header>

        <div class="workspace">
          <section class="view" id="homeView" data-view="home">
            <div class="home-layout">
              <section class="surface search-panel">
                <div class="section-label">Proposer</div>
                <form class="search" id="searchForm">
                  <input id="movieQuery" placeholder="Film" aria-label="Film" />
                  <button type="submit">Rechercher</button>
                </form>
                <p class="message" id="message"></p>
                <div class="results" id="results"></div>
              </section>

              <section class="surface selection-panel">
                <div class="section-label">Sélection</div>
                <div class="poster-grid" id="movieList"></div>
              </section>
            </div>
          </section>

          <section class="view hidden" id="drawsView" data-view="draws">
            <div class="draw-layout">
              <section class="surface draw-panel" id="adminPanel">
                <div class="panel-head">
                  <h2>Tirages</h2>
                  <button id="drawButton">Lancer</button>
                </div>
                <div class="draw-stage" id="drawStage" aria-live="polite">
                  <div class="draw-marker" aria-hidden="true"></div>
                  <div class="cover-stack" id="coverStack"></div>
                  <div class="winner hidden" id="winnerCard">
                    <div class="winner-poster" id="winnerPoster"></div>
                    <div>
                      <h2>Film tiré</h2>
                      <strong id="winnerTitle"></strong>
                      <small id="winnerUser"></small>
                    </div>
                  </div>
                </div>
              </section>

              <section class="surface admin-panel" id="usersPanel">
                <div class="panel-head">
                  <h2>Admin</h2>
                </div>
                <div class="list" id="userList"></div>
              </section>
            </div>
          </section>

          <section class="view hidden" id="seenView" data-view="seen">
            <section class="surface seen-panel">
              <div class="panel-head">
                <h2>Films vus</h2>
              </div>
              <div class="seen-grid" id="seenList"></div>
            </section>
          </section>

          <section class="view hidden" id="profileView" data-view="profile">
            <section class="surface compact-panel">
              <div class="panel-head">
                <h2>Profil</h2>
              </div>
              <div class="list" id="profileDetails"></div>
            </section>
          </section>
        </div>
      </div>

      <div class="rating-modal hidden" id="ratingModal" role="dialog" aria-modal="true" aria-labelledby="ratingModalTitle">
        <button class="rating-modal__backdrop" id="ratingModalBackdrop" type="button" aria-label="Fermer"></button>
        <section class="surface rating-modal__panel">
          <button class="rating-modal__close" id="ratingModalClose" type="button" aria-label="Fermer">×</button>
          <div class="rating-modal__content">
            <div class="rating-modal__poster" id="ratingModalPoster"></div>
            <div class="rating-modal__meta">
              <h2 id="ratingModalTitle"></h2>
              <small id="ratingModalAverage"></small>
              <div class="rating rating--modal" id="ratingModalStars"></div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
